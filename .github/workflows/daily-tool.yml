name: Daily Security & Data Tool Generator

on:
  schedule:
    # Runs daily at 9:00 AM ACST (Adelaide = UTC+9:30, so 23:30 UTC previous day)
    - cron: '30 23 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-tool:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate daily tool
        run: python generator/daily_generator.py

      - name: Commit and push
        run: |
          git config user.name "Vikrant's Security Bot"
          git config user.email "96935861+Vikrant892@users.noreply.github.com"

          git add -A

          # Get the tool name from the latest generated file
          TOOL_NAME=$(python -c "
          from generator.daily_generator import pick_tool_for_today
          cat, tool = pick_tool_for_today()
          print(f'{tool[\"title\"]} ({cat})')
          ")

          DATE=$(date -u +%Y-%m-%d)

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No new changes to commit"
          else
            git commit -m "feat: add ${TOOL_NAME} - ${DATE}

          Daily auto-generated security & data engineering tool.
          Part of the Security Toolkit daily contribution series.

          Generated by: github.com/Vikrant892/security-toolkit"
            git push
          fi
